<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>班表管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0f1117; --bg2:#1a1d27; --bg3:#242838; --border:#2e334a;
  --text:#e8eaf0; --text2:#8b90a8; --accent:#4f8ef7; --accent2:#7c5cfc;
  --eraser:#f75a5a; --today:#f7c948; --radius:9px; --panel-w:272px;
}
html,body { height:100%; overflow:hidden; }
body { font-family:'Noto Sans SC',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; font-size:14px; }

/* ── TOP BAR ── */
#topBar { display:flex; align-items:center; padding:0 10px; height:48px; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; gap:6px; }
#topBar h1 { font-size:13px; font-weight:700; letter-spacing:.06em; white-space:nowrap; }
.nav-g { display:flex; align-items:center; gap:5px; }
#yearLabel { font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:600; color:var(--accent); cursor:pointer; padding:1px 6px; border-radius:5px; }
#yearLabel:hover { background:var(--bg3); }
.ibtn { display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:7px; border:1px solid var(--border); background:var(--bg3); color:var(--text); cursor:pointer; font-size:13px; transition:all .14s; flex-shrink:0; }
.ibtn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
.ibtn.on { background:var(--accent2); border-color:var(--accent2); color:#fff; }
.ibtn.eraser-on { background:var(--eraser); border-color:var(--eraser); color:#fff; }
.tbtn { display:flex; align-items:center; gap:4px; padding:0 9px; height:30px; border-radius:7px; border:1px solid var(--border); background:var(--bg3); color:var(--text); cursor:pointer; font-size:11px; font-family:inherit; white-space:nowrap; flex-shrink:0; transition:all .14s; }
.tbtn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
.spacer { flex:1; }

/* ── LAYOUT ── */
#main { display:flex; flex:1; overflow:hidden; min-height:0; }

/* ── PALETTE ── */
#palette { width:var(--panel-w); flex-shrink:0; display:flex; flex-direction:column; background:var(--bg2); border-right:1px solid var(--border); overflow:hidden; transition:width .22s ease,transform .22s ease; }
#palette.closed { width:0; }
#palHdr { padding:9px 11px 7px; border-bottom:1px solid var(--border); font-size:10px; font-weight:500; letter-spacing:.08em; color:var(--text2); text-transform:uppercase; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }

/* eraser tool */
#eraserBtn { display:flex; align-items:center; gap:6px; margin:6px 8px 2px; padding:7px 10px; border-radius:7px; border:2px solid var(--border); background:var(--bg3); color:var(--text2); cursor:pointer; font-size:12px; font-family:inherit; transition:all .14s; }
#eraserBtn:hover { border-color:var(--eraser); color:var(--eraser); }
#eraserBtn.on { border-color:var(--eraser); background:rgba(247,90,90,.12); color:var(--eraser); }
#eraserIcon { font-size:15px; }

#shiftList { flex:1; overflow-y:auto; padding:5px; display:flex; flex-direction:column; gap:3px; }
#shiftList::-webkit-scrollbar { width:3px; }
#shiftList::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.chip { display:flex; align-items:center; gap:7px; padding:7px 9px; border-radius:7px; background:var(--bg3); border:2px solid transparent; cursor:pointer; transition:all .12s; }
.chip:hover { border-color:rgba(255,255,255,.18); }
.chip.on { border-color:#fff; }
.chip-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.chip-name { font-weight:600; font-size:12px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.chip-time { font-size:9px; color:var(--text2); font-family:'JetBrains Mono',monospace; }
.chip-acts { display:flex; gap:2px; opacity:0; transition:opacity .1s; }
.chip:hover .chip-acts { opacity:1; }
.chip-act { width:20px; height:20px; border-radius:4px; border:1px solid var(--border); background:var(--bg2); color:var(--text2); cursor:pointer; font-size:10px; display:flex; align-items:center; justify-content:center; }
.chip-act:hover { background:var(--eraser); color:#fff; border-color:var(--eraser); }
.chip-act.ed:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
#addChipBtn { margin:5px 8px 8px; padding:8px; border-radius:7px; border:1px dashed var(--accent2); background:transparent; color:var(--accent2); cursor:pointer; font-size:12px; font-family:inherit; transition:all .12s; flex-shrink:0; }
#addChipBtn:hover { background:rgba(124,92,252,.1); }

/* ── CALENDAR AREA ── */
#calArea { flex:1; overflow:hidden; display:flex; flex-direction:column; min-width:0; }
#monthNav { display:flex; align-items:center; padding:6px 10px; border-bottom:1px solid var(--border); background:var(--bg2); flex-shrink:0; gap:5px; flex-wrap:wrap; }
#monthLabel { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; min-width:36px; text-align:center; }
#monthBtns { display:flex; gap:3px; flex-wrap:wrap; flex:1; }
.mbtn { padding:2px 7px; border-radius:5px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); cursor:pointer; font-size:11px; font-family:inherit; transition:all .1s; }
.mbtn:hover { border-color:var(--accent); color:var(--accent); }
.mbtn.on { border-color:var(--accent); background:rgba(79,142,247,.14); color:var(--accent); }

/* selection bar */
#selBar { padding:5px 10px; background:rgba(79,142,247,.1); border-bottom:1px solid rgba(79,142,247,.28); display:none; align-items:center; gap:7px; font-size:11px; flex-wrap:wrap; flex-shrink:0; }
#selBar.vis { display:flex; }
#selCount { font-weight:700; color:var(--accent); }
.sbbtn { padding:2px 9px; border-radius:5px; border:1px solid var(--border); background:var(--bg3); color:var(--text); cursor:pointer; font-size:11px; font-family:inherit; transition:all .1s; }
.sbbtn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
.sbbtn.del:hover { background:var(--eraser); border-color:var(--eraser); }

#calScroll { flex:1; overflow-y:auto; padding:9px; min-height:0; }
#calScroll::-webkit-scrollbar { width:3px; }
#calScroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── YEAR GRID ── */
#yearGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(min(100%,210px),1fr)); gap:9px; }
.mini-month { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.mini-hdr { padding:6px 9px; font-size:11px; font-weight:600; background:var(--bg3); border-bottom:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:4px; transition:background .1s; }
.mini-hdr:hover { background:rgba(79,142,247,.1); color:var(--accent); }
.tally { display:flex; gap:3px; flex-wrap:wrap; }
.tb { font-size:8px; padding:1px 4px; border-radius:3px; color:#fff; font-weight:600; }
.wk-hdr { display:grid; grid-template-columns:repeat(7,1fr); padding:3px 2px 1px; }
.wk-hdr span { text-align:center; font-size:8px; color:var(--text2); }
.day-grid { display:grid; grid-template-columns:repeat(7,1fr); padding:0 2px 3px; gap:1px; }

/* ── UNIFIED DAY CELL ── */
/* mini (year view) */
.dc { border-radius:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; user-select:none; border:1.5px solid transparent; font-family:'JetBrains Mono',monospace; touch-action:none; transition:border-color .1s, background .1s; }
/* mini size */
.dc { aspect-ratio:1; font-size:9px; }
/* big size (month view) */
.dc.big { aspect-ratio:unset; min-height:58px; align-items:flex-start; justify-content:flex-start; padding:4px 5px; font-size:unset; border-radius:7px; background:var(--bg2); border-color:var(--border); }
.dc.other { color:var(--border); pointer-events:none; }
.dc.big.other { opacity:.25; pointer-events:none; }
.dc.wknd:not(.other) .dc-num { color:#c4a8ff; }
.dc.today { border-color:var(--today) !important; }
.dc.today .dc-num { color:var(--today); font-weight:700; }
.dc:not(.other):hover { border-color:rgba(255,255,255,.2); }
.dc.sel { border-color:var(--accent) !important; box-shadow:0 0 0 1px var(--accent) inset; }
.dc.painted { border-color:transparent !important; }
.dc.big.painted { border-color:transparent !important; }
.dc-num { font-size:9px; position:relative; z-index:1; }
.dc.big .dc-num { font-size:10px; }
.dc-shift { font-size:9px; margin-top:2px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100%; color:#fff; }
.dc-note  { font-size:8px; opacity:.72; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100%; color:#fff; margin-top:1px; }

/* big day grid */
#bigDayGrid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.big-wk-hdr { display:grid; grid-template-columns:repeat(7,1fr); padding:3px 0 5px; border-bottom:1px solid var(--border); margin-bottom:5px; }
.big-wk-hdr span { text-align:center; font-size:11px; color:var(--text2); }

/* stats */
#statsBar { display:flex; flex-wrap:wrap; gap:5px; padding:6px 9px; border-top:1px solid var(--border); background:var(--bg2); flex-shrink:0; min-height:34px; align-items:center; }
.stat { display:flex; align-items:center; gap:4px; padding:2px 7px; border-radius:4px; font-size:11px; background:var(--bg3); }
.stat-dot { width:7px; height:7px; border-radius:2px; flex-shrink:0; }

/* ── MODALS ── */
.overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.62); display:none; align-items:center; justify-content:center; padding:14px; }
.overlay.open { display:flex; }
.modal { background:var(--bg2); border:1px solid var(--border); border-radius:12px; width:100%; max-width:420px; box-shadow:0 20px 48px rgba(0,0,0,.55); overflow:hidden; }
.mhdr { display:flex; align-items:center; justify-content:space-between; padding:13px 17px 10px; border-bottom:1px solid var(--border); }
.mtitle { font-size:14px; font-weight:700; }
.mclose { width:25px; height:25px; border-radius:5px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; }
.mclose:hover { background:var(--eraser); color:#fff; border-color:var(--eraser); }
.mbody { padding:13px 17px; display:flex; flex-direction:column; gap:10px; }
.mfoot { display:flex; gap:7px; padding:10px 17px; border-top:1px solid var(--border); justify-content:flex-end; }
.frow { display:flex; flex-direction:column; gap:4px; }
.frow label { font-size:10px; color:var(--text2); font-weight:500; text-transform:uppercase; letter-spacing:.05em; }
.finput { background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:7px 9px; font-size:13px; font-family:inherit; outline:none; width:100%; transition:border-color .12s; }
.finput:focus { border-color:var(--accent); }
.frow-h { display:flex; gap:7px; }
.frow-h .frow { flex:1; }
.mbtn { padding:6px 15px; border-radius:7px; border:1px solid var(--border); font-family:inherit; font-size:13px; cursor:pointer; transition:all .12s; }
.mbtn.sec { background:var(--bg3); color:var(--text2); }
.mbtn.sec:hover { color:var(--text); }
.mbtn.pri { background:var(--accent); border-color:var(--accent); color:#fff; }
.mbtn.pri:hover { opacity:.84; }
#tmplList { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
.tmpl { padding:3px 8px; border-radius:5px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); cursor:pointer; font-size:10px; font-family:inherit; }
.tmpl:hover { border-color:var(--accent); color:var(--accent); }

/* ctx menu */
#ctx { position:fixed; z-index:300; background:var(--bg2); border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 22px rgba(0,0,0,.5); padding:4px; min-width:150px; display:none; }
.ci { padding:6px 11px; border-radius:5px; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:7px; transition:background .08s; }
.ci:hover { background:var(--bg3); }
.ci.del { color:var(--eraser); }
.ci.del:hover { background:rgba(247,90,90,.1); }
.csep { height:1px; background:var(--border); margin:3px 0; }

/* shift submenu inside ctx */
#ctxShifts { max-height:160px; overflow-y:auto; display:flex; flex-direction:column; gap:1px; }
#ctxShifts::-webkit-scrollbar { width:3px; }
#ctxShifts::-webkit-scrollbar-thumb { background:var(--border); }

/* ── RESPONSIVE ── */
@media (max-width:620px) {
  :root { --panel-w:230px; }
  #palette { position:fixed; left:0; top:48px; bottom:0; z-index:50; transition:transform .22s ease; }
  #palette.closed { transform:translateX(-105%); width:var(--panel-w); }
  #monthBtns { display:none; }
  .dc.big { min-height:42px; }
}
@media (max-width:400px) {
  .dc.big { min-height:34px; padding:2px 3px; }
  .dc.big .dc-num { font-size:9px; }
  .dc-shift { font-size:8px; }
}
</style>
</head>
<body>

<div id="topBar">
  <div class="nav-g">
    <button class="ibtn" id="togglePal" title="班次面板">🎨</button>
    <h1>班 表</h1>
  </div>
  <div class="nav-g" style="flex:1;justify-content:center;">
    <button class="ibtn" id="prevYear">‹‹</button>
    <span id="yearLabel">2025</span>
    <button class="ibtn" id="nextYear">››</button>
  </div>
  <div class="nav-g">
    <button class="tbtn" id="expJsonBtn">⬇ <span>JSON</span></button>
    <button class="tbtn" id="impJsonBtn">⬆ <span>JSON</span></button>
    <button class="tbtn" id="expIcsBtn">📅 <span>ICS</span></button>
    <input type="file" id="impJsonFile" accept=".json" style="display:none">
    <input type="file" id="impIcsFile"  accept=".ics"  style="display:none">
  </div>
</div>

<div id="main">
  <!-- PALETTE -->
  <div id="palette">
    <div id="palHdr">
      <span>班次颜料盘</span>
    </div>
    <!-- Eraser tool -->
    <button id="eraserBtn"><span id="eraserIcon">◻</span> 橡皮擦（清除班次）</button>
    <div id="shiftList"></div>
    <button id="addChipBtn">＋ 添加班次类型</button>
  </div>

  <!-- CALENDAR -->
  <div id="calArea">
    <div id="monthNav">
      <button class="ibtn" id="prevBtn">‹</button>
      <span id="monthLabel">全年</span>
      <div id="monthBtns"></div>
      <button class="ibtn" id="nextBtn">›</button>
    </div>
    <div id="selBar">
      <span>已选 <span id="selCount">0</span> 天</span>
      <button class="sbbtn" id="applyBtn">应用班次</button>
      <button class="sbbtn del" id="clearSelBtn">清除班次</button>
      <button class="sbbtn" id="noteBtn">添加备注</button>
      <button class="sbbtn" id="deselBtn">取消全选</button>
    </div>
    <div id="calScroll">
      <div id="yearGrid"></div>
      <div id="singleMonth" style="display:none">
        <div class="big-wk-hdr" id="bigWkHdr"></div>
        <div id="bigDayGrid"></div>
      </div>
    </div>
    <div id="statsBar"></div>
  </div>
</div>

<!-- SHIFT MODAL -->
<div class="overlay" id="shiftModal">
  <div class="modal">
    <div class="mhdr"><span class="mtitle" id="smTitle">添加班次</span><button class="mclose" id="smClose">✕</button></div>
    <div class="mbody">
      <div id="tmplList"></div>
      <div class="frow"><label>班次名称</label><input class="finput" id="fName" placeholder="如：早班、夜班、休息…"></div>
      <div class="frow-h">
        <div class="frow"><label>开始时间</label><input class="finput" id="fStart" type="time" value="08:00"></div>
        <div class="frow"><label>结束时间</label><input class="finput" id="fEnd"   type="time" value="16:00"></div>
      </div>
      <div class="frow-h">
        <div class="frow"><label>提醒（分钟前）</label><input class="finput" id="fAlarm" type="number" value="30" min="0"></div>
        <div class="frow"><label>颜色</label><input class="finput" id="fColor" type="color" value="#4f8ef7" style="height:36px;padding:3px;cursor:pointer;"></div>
      </div>
      <div class="frow"><label>备注</label><input class="finput" id="fDesc" placeholder="可选"></div>
    </div>
    <div class="mfoot">
      <button class="mbtn sec" id="smCancel">取消</button>
      <button class="mbtn pri" id="smSave">保存</button>
    </div>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="overlay" id="noteModal">
  <div class="modal" style="max-width:330px">
    <div class="mhdr"><span class="mtitle">添加备注</span><button class="mclose" id="nmClose">✕</button></div>
    <div class="mbody">
      <div class="frow"><label>备注（多行对应多天）</label><textarea class="finput" id="noteText" rows="4" style="resize:vertical" placeholder="每行对应一个选中日期"></textarea></div>
    </div>
    <div class="mfoot">
      <button class="mbtn sec" id="nmCancel">取消</button>
      <button class="mbtn pri" id="nmSave">保存</button>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx">
  <div class="ci" id="ctxSwitch">🔁 改涂为…</div>
  <div id="ctxShifts"></div>
  <div class="csep"></div>
  <div class="ci" id="ctxNote">📝 添加备注</div>
  <div class="csep"></div>
  <div class="ci del" id="ctxDel">✕ 清除班次</div>
</div>

<script src="script.js"></script>
</body>
</html>
